name: Bug report
description: Report a reproducible problem with the JetBrains plugin.
title: "[Bug]: "
labels: ["bug", "support", "jetbrains"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough environment detail to reproduce it.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "1.1.1"
    validations:
      required: true
  - type: input
    id: ide-version
    attributes:
      label: IDE and version
      placeholder: "IntelliJ IDEA 2024.1.7 / PyCharm 2024.1.x"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a minimal file/config example when possible.
      placeholder: "1. Open ...\n2. Configure ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant IDE logs, stack traces, screenshots, or sample configs.